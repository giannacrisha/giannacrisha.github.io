<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gianna Crisha — Journal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+SC:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/journal.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- WebGL Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Loading Screen -->
  <div id="loading">
    <canvas id="heart-canvas" width="280" height="280"></canvas>
    <p class="loading-tagline">portfolio journal</p>
  </div>

  <!-- Click Hint -->
  <div id="hint">
    <span class="hint-text">open the journal</span>
    <span class="hint-arrow">↓</span>
  </div>

  <!-- Portal flash — full-screen white overlay for camera-dive transition -->
  <div id="portal-flash"></div>

  <!-- Journal UI Overlay -->
  <div id="journal-ui">
    <div id="journal-book">

      <!-- Infinite panning paper canvas -->
      <div id="book-paper">
        <div id="paper-canvas"></div>
        <button class="book-close" id="bm-close">close</button>
      </div>

    </div><!-- #journal-book -->
  </div><!-- #journal-ui -->


  <script type="module" src="js/journal.js"></script>
</body>
</html>
