name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro type check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          # Provide stub values so serverless routes don't error at build time.
          # Real secrets live in Vercel — never commit actual values here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KV_REST_API_URL: https://placeholder.upstash.io
          KV_REST_API_TOKEN: placeholder
